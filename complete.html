<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Завершение заявки</title>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #F8FAFC; margin: 0; }
    .card { background: white; padding: 30px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    h2 { color: #16A34A; margin-bottom: 8px; }
    p { color: #64748B; font-size: 14px; }
  </style>
</head>
<body>

  <div class="card">
    <h2 id="title">⏳ Выполняем...</h2>
    <p id="desc">Обновляем статус в Telegram и базе данных</p>
  </div>

  <script>
    // Вставь свои данные Telegram и Supabase
    const TELEGRAM_BOT_TOKEN = "ТВОЙ_TELEGRAM_BOT_TOKEN"; 
    const TELEGRAM_CHAT_ID = "ТВОЙ_TELEGRAM_CHAT_ID"; 

    const SUPABASE_URL = "https://wxkqfkjaretsqzdfnzhw.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind4a3Fma2phcmV0c3F6ZGZuemh3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM3MDM1NTMsImV4cCI6MjA5OTI3OTU1M30.7ztRTIZM9ytG9LLCFE5pvVTEpV9re5IrxIomMrJxVKw";

    const urlParams = new URLSearchParams(window.location.search);
    const printerId = urlParams.get('id');
    const messageId = urlParams.get('msg_id'); // ID сообщения в Telegram

    async function completeOrder() {
      if (!printerId) return;

      // 1. Обновляем статус в Supabase
      await fetch(`${SUPABASE_URL}/rest/v1/printers?id=eq.${encodeURIComponent(printerId)}`, {
        method: 'PATCH',
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ status: 'Выполнено' })
      });

      // 2. Если есть ID сообщения, меняем текст прямо в Телеграме!
      if (messageId && TELEGRAM_BOT_TOKEN && TELEGRAM_CHAT_ID) {
        const text = `✅ **ЗАЯВКА ВЫПОЛНЕНА!**\n• ID принтера: ${printerId}\n• Статус: ✅ Завершено мастером`;
        
        await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/editMessageText`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: TELEGRAM_CHAT_ID,
            message_id: messageId,
            text: text,
            parse_mode: 'Markdown'
          })
        });
      }

      // 3. Возвращаем мастера обратно в Telegram
      document.getElementById('title').innerText = "✅ Заявка закрыта!";
      document.getElementById('desc').innerText = "Возвращаемся в Telegram...";
      
      setTimeout(() => {
        window.location.href = "https://t.me"; // Автоматический редирект в ТГ
      }, 1000);
    }

    completeOrder();
  </script>
</body>
</html>
