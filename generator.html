<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR-генератор принтеров</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f5f5f7;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 24px 16px;
        }
        .card {
            background: white;
            padding: 32px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-sizing: border-box;
        }
        h1 {
            font-size: 24px;
            font-weight: 600;
            margin: 0 0 8px 0;
            color: #1d1d1f;
        }
        p {
            font-size: 14px;
            color: #86868b;
            margin: 0 0 24px 0;
        }
        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: #1d1d1f;
            margin-bottom: 6px;
        }
        input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 1px solid #d2d2d7;
            border-radius: 12px;
            background-color: #f5f5f7;
            color: #1d1d1f;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        input:focus {
            outline: none;
            border-color: #0071e3;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.15);
        }
        button {
            width: 100%;
            background-color: #0071e3;
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            margin-top: 8px;
            transition: background-color 0.2s ease;
        }
        button:hover {
            background-color: #0077ed;
        }
        .hidden {
            display: none !important;
        }
        #qrResult {
            margin-top: 32px;
            padding-top: 28px;
            border-top: 1px solid #e8e8ed;
        }
        #qrResult h2 {
            font-size: 18px;
            font-weight: 600;
            color: #1d1d1f;
            margin: 0 0 8px 0;
        }
        #qrResult .printer-id {
            font-size: 13px;
            color: #86868b;
            margin-bottom: 20px;
        }
        #qrcode {
            display: flex;
            justify-content: center;
            margin-bottom: 16px;
        }
        #qrcode img,
        #qrcode canvas {
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
        }
        .qr-link {
            font-size: 13px;
            color: #0071e3;
            word-break: break-all;
            margin-bottom: 20px;
            line-height: 1.5;
        }
        .qr-link a {
            color: #0071e3;
            text-decoration: none;
        }
        .qr-link a:hover {
            text-decoration: underline;
        }
        .print-btn {
            background-color: #1d1d1f;
        }
        .print-btn:hover {
            background-color: #333336;
        }
        @media print {
            body {
                background: white;
                padding: 0;
            }
            .card {
                box-shadow: none;
                max-width: 100%;
            }
            #orderForm,
            h1,
            .card > p,
            .no-print {
                display: none !important;
            }
            #qrResult {
                border-top: none;
                margin-top: 0;
                padding-top: 0;
            }
            .print-btn {
                display: none !important;
            }
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>QR-генератор</h1>
        <p>Создайте наклейку для принтера</p>
        
        <form id="orderForm">
            <div class="form-group">
                <label for="nameInput">Ответственное лицо</label>
                <input type="text" id="nameInput" placeholder="Например, Иван Петров" required>
            </div>

            <div class="form-group">
                <label for="modelInput">Модель принтера</label>
                <input type="text" id="modelInput" placeholder="Например, Canon LBP6030" required>
            </div>
            
            <div class="form-group">
                <label for="addressInput">Адрес установки</label>
                <input type="text" id="addressInput" placeholder="Например, каб. 104, этаж 1" required>
            </div>
            
            <button type="submit">Сгенерировать и отправить в базу</button>
        </form>

        <div id="qrResult" class="hidden">
            <h2>QR-код готов</h2>
            <p class="printer-id" id="qrPrinterId"></p>
            <div id="qrcode"></div>
            <p class="qr-link" id="qrUrl"></p>
            <button type="button" class="print-btn" onclick="window.print()">Распечатать наклейку</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
